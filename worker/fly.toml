# Fly.io config for the availability poller worker.
# Deploy from the repo root:
#   fly deploy --config worker/fly.toml --dockerfile worker/Dockerfile
#
# Required secrets (fly secrets set KEY=value --app campsite-finder-worker):
#   NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#   RESEND_API_KEY, EMAIL_FROM

app = "campsite-finder-worker"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  POLL_INTERVAL_MS = "15000"
  PORT = "8080"
  # Delivery canary (synthetic email+SMS send proving the last mile). Daily, not the
  # 6h code default: the SMS send costs A2P money and once/day still catches a Twilio
  # outage well within the window we'd want to know it broke.
  CANARY_DELIVERY_INTERVAL_MS = "86400000"

# This is primarily a background poller. The HTTP service exists for ONE endpoint
# (POST /gtc/availability, shared-secret guarded) that the Vercel search page
# calls, because Camis' WAF 403s Vercel's IPs but not Fly's.
#
# The autostop/autostart settings are load-bearing: the poller must run
# continuously, so machines must NEVER be stopped for being idle, and Fly must
# not start the second (standby) machine on traffic — two live pollers would
# double the Camis request rate for no benefit.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

# Readiness check on the poller's /health, which reports 503 once heartbeats stop
# landing (a wedged-but-"started" machine — the 2026-07-22 incident). This surfaces
# the wedge to the load balancer, deploy gating, and `flyctl status`. NOTE: the
# actual auto-recovery is the poller's in-process watchdog (it process.exit(1)s so
# Fly reboots the VM) — this check is the visible signal, not the trigger, because
# Fly's "restart on failing check" behavior is not something we want to rely on for
# alerting uptime. grace_period covers the poller's startup probes before cycle 1.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "90s"
  method = "get"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
