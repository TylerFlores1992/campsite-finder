<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CampHawk</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b3d2e; color: #f5f5f4;
        font-family: -apple-system, system-ui, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
        justify-content: center; text-align: center; padding: 24px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { opacity: .8; margin: 0; }
    </style>
  </head>
  <body>
    <!-- Fallback shell: shown only if camphawk.app can't be reached at launch.
         In normal operation Capacitor loads the live site (server.url). -->
    <div class="wrap">
      <h1>⛺ CampHawk</h1>
      <p>Couldn't reach camphawk.app — check your connection and reopen the app.</p>
    </div>
  </body>
</html>
